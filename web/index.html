<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#7BA05B" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-title" content="Allsquare" />

    <title>Allsquare | Split group bills with no sign-up</title>
    <meta
      name="description"
      content="Group bill splitter with no sign-up. Share one link, add expenses in any currency, and settle with the fewest payments. A Splitwise alternative for trips, dinners, and shared houses."
    />
    <link rel="canonical" href="https://all-sqr.com/" />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Allsquare" />
    <meta property="og:title" content="Allsquare | Split group bills with no sign-up" />
    <meta
      property="og:description"
      content="Split anything. End up all square. No accounts, any currency, one shared link."
    />
    <meta property="og:url" content="https://all-sqr.com/" />
    <meta property="og:image" content="https://all-sqr.com/og.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Allsquare: Split anything. End up all square." />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Allsquare | Split group bills with no sign-up" />
    <meta
      name="twitter:description"
      content="Split anything. End up all square. No accounts, any currency, one shared link."
    />
    <meta name="twitter:image" content="https://all-sqr.com/og.png" />

    <!-- Structured data -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "Allsquare",
        "url": "https://all-sqr.com/",
        "description": "Group bill splitter with no sign-up. Share one link, add expenses in any currency, and settle with the fewest payments.",
        "applicationCategory": "FinanceApplication",
        "operatingSystem": "Any",
        "browserRequirements": "Requires JavaScript"
      }
    </script>
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "FAQPage",
        "mainEntity": [
          {
            "@type": "Question",
            "name": "Do I need an account to use Allsquare?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "No. Start a group, share the link, and everyone is in. Nobody signs up, ever."
            }
          },
          {
            "@type": "Question",
            "name": "Do my friends need to install anything?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "No. The link opens in any browser, on any phone or laptop. Allsquare can also be added to the home screen like an app."
            }
          },
          {
            "@type": "Question",
            "name": "How does multi-currency splitting work?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Add each expense in the currency you paid in. Allsquare locks that day's exchange rate, and everyone settles in the group's home currency."
            }
          },
          {
            "@type": "Question",
            "name": "How is Allsquare different from Splitwise?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "There are no accounts and nothing to install. Start a group, share the link, and everyone is in within seconds."
            }
          }
        ]
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
